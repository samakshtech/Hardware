<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Multi-Player Grid</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 16px; }
    .controls { margin-bottom: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, 200px); gap: 8px; max-height: calc(100vh - 120px); overflow: auto; }
    iframe { width: 200px; height: 112px; border: 1px solid #ccc; background: #000; }
    input[type="text"]{ width: 520px; }
  </style>
</head>
<body>
  <div class="controls">
    <label>URL: <input id="url" type="text" placeholder="Paste a YouTube/Vimeo or video URL" /></label>
    <label style="margin-left:8px">Count: <input id="count" type="number" value="100" min="1" max="500" style="width:80px" /></label>
    <button id="start">Load</button>
    <button id="clear">Clear</button>
  </div>
  <div class="grid" id="grid"></div>
  <script>
  const urlInput = document.getElementById('url');
  const countInput = document.getElementById('count');
  const startBtn = document.getElementById('start');
  const clearBtn = document.getElementById('clear');
  const grid = document.getElementById('grid');

  function toEmbedUrl(url){
    try{
      const u = new URL(url);
      const host = u.hostname.toLowerCase();
      if(host.includes('youtube.com') || host.includes('youtu.be')){
        let id = '';
        if(host.includes('youtu.be')) id = u.pathname.slice(1);
        else id = u.searchParams.get('v') || '';
        if(!id){
          const parts = u.pathname.split('/').filter(Boolean);
          id = parts.pop() || '';
        }
        if(id) return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1`;
      }
      if(host.includes('vimeo.com')){
        const id = u.pathname.split('/').filter(Boolean).pop();
        if(id) return `https://player.vimeo.com/video/${id}?autoplay=1&muted=1`;
      }
    }catch(e){ }
    // direct video file
    if(url.match(/\.(mp4|webm|ogg)(\?|$)/i)) return url;
    return url;
  }

  startBtn.addEventListener('click', ()=>{
    const url = urlInput.value.trim();
    const count = Math.max(1, Math.min(500, parseInt(countInput.value)||100));
    if(!url){ alert('Enter URL'); return; }
    grid.innerHTML = '';
    const embed = toEmbedUrl(url);
    for(let i=0;i<count;i++){
      const ifr = document.createElement('iframe');
      ifr.src = embed;
      ifr.allow = 'autoplay; fullscreen; picture-in-picture';
      ifr.loading = 'lazy';
      grid.appendChild(ifr);
    }
  });

  clearBtn.addEventListener('click', ()=> grid.innerHTML = '');
  </script>
</body>
</html>
